<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>灵眸智镜 - 分享二维码</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: white;
    }
    h1 {
      color: #1e1b4b;
      font-size: 24px;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #64748b;
      font-size: 14px;
      margin-bottom: 30px;
    }
    .qrcode-wrapper {
      background: #f8fafc;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .qrcode {
      width: 200px;
      height: 200px;
      margin: 0 auto;
    }
    .url {
      font-size: 12px;
      color: #94a3b8;
      word-break: break-all;
      margin-bottom: 20px;
      padding: 12px;
      background: #f8fafc;
      border-radius: 8px;
    }
    .tip {
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.6;
    }
    .tip strong {
      color: #6366f1;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">👁️</div>
    <h1>灵眸智镜</h1>
    <p class="subtitle">青少年视力健康数据分析平台</p>
    
    <div class="qrcode-wrapper">
      <img 
        class="qrcode" 
        src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=http://192.168.0.107:5173" 
        alt="访问灵眸智镜"
      />
    </div>
    
    <div class="url">http://192.168.0.107:5173</div>
    
    <div class="tip">
      <p>📱 使用手机 <strong>微信扫一扫</strong> 或 <strong>相机扫描</strong></p>
      <p>⚠️ 需与电脑连接 <strong>同一Wi-Fi网络</strong></p>
    </div>
  </div>
</body>
</html>
